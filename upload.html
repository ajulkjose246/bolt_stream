<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="navbar-sec">
        <nav class="navbar navbar-expand-lg bg-color">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Bolt Stream</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="./index.html"><i class="bi bi-house"></i> Home</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </section>
    <section class="register-sec">
        <div class="register-div">
            <div class="container">

                <div class="row">
                    <div class="col-12 col-sm-12 col-lg-6">
                        <img class="login-svg" src="./img/undraw_fingerprint_re_uf3f.svg" alt="">
                    </div>
                    <div class="cre-acc col-12 col-sm-12 col-lg-6">
                        <div class="reg-head">
                            <span>Upload Movies
                                <hr>
                            </span>
                        </div>

                        <form class="row g-3 needs-validation" novalidate>
                            <div class="col-md-12">
                                <label class="form-label">Movie Name</label>
                                <input type="text" class="form-control" id="mov_name">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Director</label>
                                <input type="text" class="form-control" id="mov_dir">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Language</label>
                                <input type="text" class="form-control" id="mov_language">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Release Date</label>
                                <input type="text" class="form-control" id="mov_date">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Server Id 1 (2embed.org)</label>
                                <input type="text" class="form-control" id="mov_ser_id_1">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Server Id 2 (v2.vidsrc.me)</label>
                                <input type="text" class="form-control" id="mov_ser_id_2">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Server Id 3</label>
                                <input type="text" class="form-control" id="mov_ser_id_3">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Server Id 4</label>
                                <input type="text" class="form-control" id="mov_ser_id_4">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Server Id 5</label>
                                <input type="text" class="form-control" id="mov_ser_id_5">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Genre</label>
                                <input type="text" class="form-control" id="mov_genre">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">IMDB Rating</label>
                                <input type="text" class="form-control" id="mov_imdb">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Bio</label>
                                <textarea class="form-control" id="mov_bio"></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Image Url</label>
                                <textarea class="form-control" id="mov_img"></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Banner Url</label>
                                <textarea class="form-control" id="mov_banner_img"></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Trailer</label>
                                <textarea class="form-control" id="mov_trailer"></textarea>
                            </div>
                            <div class="col-md-12 error_msg">
                            </div>
                            <div class="col-12 upload-btn">
                                <a id="upload_btn" type="submit" class="btn btn-primary">Upload</a>
                                <input type="reset" value="Reset" class="btn btn-primary">
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </section>
</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="./js/firebase.js" type="module"></script>
<script src="./js/index.js"></script>
<script src="./js/upload.js"></script>
<script src="./js/stream.js"></script>
<script src="./js/script.js"></script>

</html>
