    <section class="movie-stream-sec">
        <div class="movie-stream-div">
            <iframe id="movie_url" src="" width="100%" height="490px" allowfullscreen="allowfullscreen">
            </iframe>
        </div>
        <div class="servers">
            <div class="btn-group" role="group" aria-label="Basic radio toggle button group">
                <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off" checked>
                <label class="btn btn-outline-info" for="btnradio1">Server 1</label>

                <input type="radio" class="btn-check" name="btnradio" id="btnradio2" autocomplete="off">
                <label class="btn btn-outline-info" for="btnradio2">Server 2</label>
            </div>

        </div>
        <div class="container">

            <div class="row movie-details-row">
                <div class="col-4 col-sm-2">
                    <div class="movie-img">
                        <img id="image-1" src="./img/movie-img.jpg" alt="">
                    </div>
                </div>
                <div class="col-8 col-sm-10">
                    <div class="movie-details">
                        <span class="movie-name" id="movie_names">ajul </span><br>
                        <a id="movie_trailer" href="https://www.youtube.com/watch?v=HhIl_XJ-OGA" target="_blank">
                            <i class="bi bi-camera-video-fill"></i> Trailer </a>
                        <i class="bi bi-star-fill"></i><span class="imdb_rating">IMDB: 4.4</span><br>
                        <br><span id="movie_bio">The untold story of one twelve-year-old's dream to become the world's
                            greatest
                            supervillain.</span><br><br>
                        <span>
                            <table>
                                <tr>
                                    <th>Director : </th>
                                    <td id="movie_director">United States</td>
                                </tr>
                                <tr>
                                    <th>Genre : </th>
                                    <td id="movie_Genre">Animation, Comedy, Adventure</td>
                                </tr>
                                <tr>
                                    <th>Release : </th>
                                    <td id="movie_Release">2022-07-01</td>
                                </tr>
                            </table>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </section>
